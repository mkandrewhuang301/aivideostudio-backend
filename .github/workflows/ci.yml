name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  NODE_VERSION: "22"

jobs:
  lint-and-typecheck:
    name: Lint + Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: aivideostudio-backend

      - name: TypeScript type check
        run: npm run lint
        working-directory: aivideostudio-backend

      - name: ESLint
        run: npm run eslint
        working-directory: aivideostudio-backend

  migration-smoke-test:
    name: Migration Smoke Test
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}
      # Dummy values — drizzle-kit check only needs DATABASE_URL.
      # These prevent config.ts from throwing at import time.
      REDIS_URL: redis://localhost:6379
      R2_ACCOUNT_ID: dummy
      R2_ACCESS_KEY_ID: dummy
      R2_SECRET_ACCESS_KEY: dummy
      R2_BUCKET_NAME: dummy
      R2_PUBLIC_DOMAIN: ""
      FIREBASE_PROJECT_ID: dummy-project
      FIREBASE_CLIENT_EMAIL: dummy@dummy.iam.gserviceaccount.com
      FIREBASE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\ndummy\n-----END PRIVATE KEY-----\n"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: aivideostudio-backend

      - name: Drizzle schema check (no changes expected)
        run: npx drizzle-kit check
        working-directory: aivideostudio-backend
